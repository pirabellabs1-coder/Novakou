<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Novakou — Rejoins la communauté WhatsApp</title>
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="em8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006e2f"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="wa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25d366"/>
      <stop offset="100%" stop-color="#128c7e"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg8)"/>

  <!-- Logo top-center -->
  <rect x="490" y="180" width="100" height="100" rx="24" ry="24" fill="url(#em8)"/>
  <text x="540" y="230" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="50" font-weight="900" letter-spacing="-2"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">NK</text>

  <!-- Big WhatsApp icon -->
  <circle cx="540" cy="700" r="220" fill="url(#wa)"/>
  <path d="M 540 580 m -90 0 a 90 90 0 1 0 180 0 a 90 90 0 1 0 -180 0 M 460 660 q 0 60 60 80 q 60 -20 60 -80"
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
        transform="translate(0 60)"/>
  <text x="540" y="715" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="180" font-weight="900"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">💬</text>

  <!-- Hero counter -->
  <text x="540" y="1100" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="160" font-weight="900" letter-spacing="-6"
        fill="url(#em8)" text-anchor="middle">+1 200</text>

  <!-- Headline -->
  <text x="540" y="1240" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-1.5"
        fill="#191c1e" text-anchor="middle">créateurs francophones</text>
  <text x="540" y="1310" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-1.5"
        fill="#191c1e" text-anchor="middle">déjà dans le groupe.</text>

  <!-- Sub -->
  <text x="540" y="1430" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="34" font-weight="500" letter-spacing="-0.5"
        fill="#5c647a" text-anchor="middle">Conseils, opportunités, entraide.</text>
  <text x="540" y="1480" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="34" font-weight="500" letter-spacing="-0.5"
        fill="#5c647a" text-anchor="middle">100 % gratuit, 100 % francophone.</text>

  <!-- CTA WhatsApp -->
  <rect x="180" y="1620" width="720" height="120" rx="28" ry="28" fill="url(#wa)"/>
  <text x="540" y="1685" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="40" font-weight="800" letter-spacing="-0.5"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">Rejoindre sur WhatsApp →</text>

  <!-- Footer -->
  <text x="540" y="1830" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="22" font-weight="600" letter-spacing="2"
        fill="#9ca3af" text-anchor="middle">novakou.com</text>
</svg>
