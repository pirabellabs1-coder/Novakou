<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <title>Novakou — Stories countdown J−3</title>
  <defs>
    <linearGradient id="bgStory" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="emeraldStory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006e2f"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgStory)"/>

  <!-- Glow circle behind hero number -->
  <circle cx="540" cy="900" r="500" fill="url(#glow)"/>

  <!-- Logo top-center -->
  <rect x="490" y="180" width="100" height="100" rx="24" ry="24" fill="url(#emeraldStory)"/>
  <text x="540" y="230" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="50" font-weight="900" letter-spacing="-2"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">NK</text>

  <!-- Pre-headline -->
  <text x="540" y="500" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="36" font-weight="600" letter-spacing="3"
        fill="#5c647a" text-anchor="middle" letter-spacing="6">PLUS QUE</text>

  <!-- Hero countdown number -->
  <text x="540" y="900" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="540" font-weight="900" letter-spacing="-25"
        fill="url(#emeraldStory)" text-anchor="middle" dominant-baseline="central">J−3</text>

  <!-- Headline -->
  <text x="540" y="1280" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-2"
        fill="#191c1e" text-anchor="middle">Lancement</text>
  <text x="540" y="1370" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-2"
        fill="#006e2f" text-anchor="middle">Novakou</text>

  <!-- Subtitle -->
  <text x="540" y="1480" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="36" font-weight="500" letter-spacing="-0.5"
        fill="#5c647a" text-anchor="middle">La plateforme des créateurs</text>
  <text x="540" y="1525" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="36" font-weight="500" letter-spacing="-0.5"
        fill="#5c647a" text-anchor="middle">digitaux d'Afrique francophone</text>

  <!-- CTA button -->
  <rect x="240" y="1640" width="600" height="100" rx="22" ry="22" fill="url(#emeraldStory)"/>
  <text x="540" y="1690" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="36" font-weight="700" letter-spacing="-0.5"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">Activer rappel →</text>

  <!-- Footer -->
  <text x="540" y="1820" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="22" font-weight="600" letter-spacing="2"
        fill="#9ca3af" text-anchor="middle">novakou.com</text>
</svg>
