<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <title>Novakou — Devenez Mentor</title>
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#191c1e"/>
      <stop offset="100%" stop-color="#0d3b1f"/>
    </linearGradient>
    <linearGradient id="em6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#006e2f"/>
    </linearGradient>
    <radialGradient id="glow6" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg6)"/>
  <rect width="1080" height="1350" fill="url(#glow6)"/>

  <!-- Logo blanc -->
  <rect x="80" y="80" width="80" height="80" rx="20" ry="20" fill="#ffffff"/>
  <text x="120" y="120" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="40" font-weight="900" letter-spacing="-1.5"
        fill="#006e2f" text-anchor="middle" dominant-baseline="central">NK</text>
  <text x="180" y="125" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="32" font-weight="800" letter-spacing="-1" fill="#ffffff">Novakou</text>

  <!-- Tag -->
  <rect x="80" y="260" width="280" height="60" rx="30" ry="30" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="300" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="22" font-weight="700" letter-spacing="0.5"
        fill="#22c55e" text-anchor="middle">REJOIGNEZ L'ÉLITE</text>

  <!-- Headline -->
  <text x="80" y="490" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="120" font-weight="800" letter-spacing="-4"
        fill="#ffffff">Devenez</text>
  <text x="80" y="620" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="120" font-weight="800" letter-spacing="-4"
        fill="url(#em6)">Mentor.</text>

  <!-- Big stat -->
  <text x="80" y="820" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="180" font-weight="900" letter-spacing="-8"
        fill="#22c55e">90 %</text>
  <text x="80" y="900" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="32" font-weight="600" letter-spacing="-0.5"
        fill="#ffffff" opacity="0.85">de chaque session vous reviennent</text>

  <!-- Sub -->
  <text x="80" y="990" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="32" font-weight="500" letter-spacing="-0.5"
        fill="#ffffff" opacity="0.7">Monétisez votre expertise.</text>
  <text x="80" y="1035" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="32" font-weight="500" letter-spacing="-0.5"
        fill="#ffffff" opacity="0.7">Coaching 1-on-1 facturé en automatique.</text>

  <!-- CTA -->
  <rect x="80" y="1130" width="500" height="100" rx="22" ry="22" fill="#ffffff"/>
  <text x="330" y="1180" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="34" font-weight="700" letter-spacing="-0.5"
        fill="#006e2f" text-anchor="middle" dominant-baseline="central">Postuler →</text>

  <!-- Domain -->
  <text x="1000" y="1290" font-family="Manrope, Inter, system-ui, sans-serif"
        font-size="22" font-weight="600"
        fill="#ffffff" opacity="0.5" text-anchor="end">novakou.com/mentors</text>
</svg>
