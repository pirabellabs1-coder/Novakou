<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Schéma de tunnel de vente avec étapes conversion">
  <defs>
    <linearGradient id="bgTV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="funnel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadowTV" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bgTV)"/>

  <!-- Decorative pattern -->
  <g opacity="0.15" stroke="#5b21b6" stroke-width="2" fill="none">
    <circle cx="200" cy="180" r="60"/>
    <circle cx="1400" cy="180" r="60"/>
    <circle cx="200" cy="720" r="80"/>
    <circle cx="1400" cy="720" r="80"/>
  </g>

  <!-- Funnel shape (5 layers) -->
  <g transform="translate(450, 120)" filter="url(#shadowTV)">
    <!-- Top layer: 1000 visitors -->
    <g transform="translate(0, 0)">
      <path d="M 0 0 L 700 0 L 660 80 L 40 80 Z" fill="#5b21b6"/>
      <text x="350" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff">1 000 visiteurs</text>
    </g>
    <!-- Layer 2 -->
    <g transform="translate(0, 90)">
      <path d="M 40 0 L 660 0 L 620 80 L 80 80 Z" fill="#7c3aed"/>
      <text x="350" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">450 leads (lead magnet)</text>
    </g>
    <!-- Layer 3 -->
    <g transform="translate(0, 180)">
      <path d="M 80 0 L 620 0 L 580 80 L 120 80 Z" fill="#8b5cf6"/>
      <text x="350" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">250 voient l'offre payante</text>
    </g>
    <!-- Layer 4 -->
    <g transform="translate(0, 270)">
      <path d="M 120 0 L 580 0 L 540 80 L 160 80 Z" fill="#22c55e"/>
      <text x="350" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">80 acheteurs (8%)</text>
    </g>
    <!-- Layer 5 (upsell) -->
    <g transform="translate(0, 360)">
      <path d="M 160 0 L 540 0 L 500 80 L 200 80 Z" fill="#16a34a"/>
      <text x="350" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">+25 prennent l'upsell</text>
    </g>
    <!-- Bottom: revenue -->
    <g transform="translate(0, 460)">
      <rect x="180" y="0" width="340" height="100" rx="20" fill="#191c1e"/>
      <text x="350" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">REVENU TOTAL</text>
      <text x="350" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff">2 750 000 FCFA</text>
    </g>
  </g>

  <!-- Left annotation: comparison vs page produit seule -->
  <g transform="translate(40, 280)" filter="url(#shadowTV)">
    <rect width="350" height="340" rx="16" fill="#ffffff"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b7280">PAGE PRODUIT SEULE</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#191c1e">1 000 visiteurs</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#6b7280">2% conversion moyenne</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#e5e7eb"/>
    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#191c1e">20 acheteurs</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">à 25 000 FCFA</text>
    <line x1="20" y1="200" x2="330" y2="200" stroke="#e5e7eb"/>
    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Revenu</text>
    <text x="20" y="280" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444">500 000 FCFA</text>
    <text x="20" y="312" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">≈ 5× moins de revenu</text>
  </g>

  <!-- Right annotation: tunnel -->
  <g transform="translate(1210, 280)" filter="url(#shadowTV)">
    <rect width="350" height="340" rx="16" fill="#22c55e"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" opacity="0.85">AVEC TUNNEL NOVAKOU</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">1 000 visiteurs</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.85">8% conversion + upsell</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#ffffff" opacity="0.3"/>
    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">80 acheteurs + 25 upsells</text>
    <text x="20" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.85">25 000 + 15 000 FCFA</text>
    <line x1="20" y1="200" x2="330" y2="200" stroke="#ffffff" opacity="0.3"/>
    <text x="20" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.85">Revenu</text>
    <text x="20" y="280" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff">2 750 000 FCFA</text>
    <text x="20" y="312" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">↗ ×5,5 avec tunnel</text>
  </g>

  <!-- Arrows -->
  <g stroke="#5b21b6" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 390 450 Q 420 450 440 450" marker-end="url(#arrow)"/>
    <path d="M 1170 450 Q 1190 450 1210 450" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#5b21b6"/>
    </marker>
  </defs>

  <text x="800" y="850" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#191c1e">Un tunnel multiplie tes conversions par 5</text>
</svg>
