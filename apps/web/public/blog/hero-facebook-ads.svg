<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Tableau de bord Facebook Ads avec courbes de conversion">
  <defs>
    <linearGradient id="bgFB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="fbCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadowFB" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bgFB)"/>

  <!-- Background blobs -->
  <circle cx="200" cy="200" r="180" fill="#1d4ed8" opacity="0.04"/>
  <circle cx="1450" cy="700" r="220" fill="#22c55e" opacity="0.04"/>

  <!-- Main dashboard -->
  <g transform="translate(160, 110)" filter="url(#shadowFB)">
    <rect width="1280" height="680" rx="20" fill="url(#fbCard)"/>
    <!-- Header -->
    <rect width="1280" height="64" rx="20" fill="#1877f2"/>
    <rect y="44" width="1280" height="20" fill="#1877f2"/>
    <text x="32" y="42" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">f Ads Manager</text>
    <text x="1110" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" opacity="0.95">Sénégal · 5 000 FCFA/j</text>

    <!-- KPI row -->
    <g transform="translate(40, 100)">
      <!-- Spend -->
      <rect width="280" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="20" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6b7280">DÉPENSE TOTALE</text>
      <text x="20" y="78" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#191c1e">47 500</text>
      <text x="170" y="78" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b7280">FCFA</text>
      <text x="20" y="102" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">↗ 8 jours actifs</text>
      <!-- Sales -->
      <g transform="translate(300, 0)">
        <rect width="280" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="20" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6b7280">VENTES GÉNÉRÉES</text>
        <text x="20" y="78" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#191c1e">20</text>
        <text x="20" y="102" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">↗ +5 ventes vs J-7</text>
      </g>
      <!-- Revenue -->
      <g transform="translate(600, 0)">
        <rect width="280" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="20" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6b7280">CHIFFRE D'AFFAIRES</text>
        <text x="20" y="78" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#191c1e">500 000</text>
        <text x="190" y="78" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b7280">FCFA</text>
        <text x="20" y="102" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">↗ ROAS 10,5×</text>
      </g>
      <!-- CTR -->
      <g transform="translate(900, 0)">
        <rect width="300" height="120" rx="12" fill="#1877f2"/>
        <text x="20" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" opacity="0.85">CONVERSION</text>
        <text x="20" y="78" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff">5,2 %</text>
        <text x="20" y="102" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.95">↗ Excellent (1-3% avg)</text>
      </g>
    </g>

    <!-- Chart area -->
    <g transform="translate(40, 260)">
      <rect width="800" height="380" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#191c1e">Performances 8 derniers jours</text>
      <text x="24" y="56" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Ventes par jour</text>

      <!-- Axis -->
      <line x1="60" y1="320" x2="780" y2="320" stroke="#e5e7eb" stroke-width="2"/>
      <line x1="60" y1="100" x2="60" y2="320" stroke="#e5e7eb" stroke-width="2"/>

      <!-- Grid lines -->
      <g stroke="#f3f4f6" stroke-width="1">
        <line x1="60" y1="280" x2="780" y2="280"/>
        <line x1="60" y1="220" x2="780" y2="220"/>
        <line x1="60" y1="160" x2="780" y2="160"/>
      </g>

      <!-- Bars (ascending) -->
      <g fill="#1877f2">
        <rect x="100" y="280" width="60" height="40" rx="4" opacity="0.85"/>
        <rect x="200" y="240" width="60" height="80" rx="4" opacity="0.85"/>
        <rect x="300" y="220" width="60" height="100" rx="4" opacity="0.85"/>
        <rect x="400" y="200" width="60" height="120" rx="4" opacity="0.85"/>
        <rect x="500" y="170" width="60" height="150" rx="4"/>
        <rect x="600" y="140" width="60" height="180" rx="4"/>
        <rect x="700" y="110" width="60" height="210" rx="4"/>
      </g>

      <!-- Line overlay -->
      <polyline points="130,300 230,260 330,240 430,220 530,180 630,155 730,125"
        stroke="url(#lineGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#22c55e">
        <circle cx="130" cy="300" r="5"/>
        <circle cx="230" cy="260" r="5"/>
        <circle cx="330" cy="240" r="5"/>
        <circle cx="430" cy="220" r="5"/>
        <circle cx="530" cy="180" r="5"/>
        <circle cx="630" cy="155" r="5"/>
        <circle cx="730" cy="125" r="6" fill="#22c55e" stroke="#ffffff" stroke-width="3"/>
      </g>

      <!-- Day labels -->
      <g font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
        <text x="130" y="340">J1</text>
        <text x="230" y="340">J2</text>
        <text x="330" y="340">J3</text>
        <text x="430" y="340">J4</text>
        <text x="530" y="340">J5</text>
        <text x="630" y="340">J6</text>
        <text x="730" y="340">J7</text>
      </g>
    </g>

    <!-- Right side: best creative card -->
    <g transform="translate(860, 260)">
      <rect width="380" height="380" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="24" y="36" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#191c1e">🏆 Créatif gagnant</text>

      <!-- Mock video preview -->
      <rect x="24" y="56" width="332" height="186" rx="10" fill="#191c1e"/>
      <circle cx="190" cy="149" r="32" fill="#ffffff" opacity="0.95"/>
      <polygon points="178,131 178,167 210,149" fill="#1877f2"/>
      <text x="40" y="80" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">VIDÉO SELFIE · 15s</text>

      <!-- Stats -->
      <text x="24" y="276" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280">CTR</text>
      <text x="24" y="304" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1877f2">3,8%</text>

      <text x="160" y="276" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280">CPM</text>
      <text x="160" y="304" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#191c1e">1 250 FCFA</text>

      <text x="24" y="346" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Garde celui-ci, scale +20%/jour</text>
    </g>
  </g>
</svg>
